<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chuyển đổi Kết quả Xổ số</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Roboto+Mono:wght@400;500&amp;display=swap');
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    
    .mono {
      font-family: 'Roboto Mono', monospace;
    }

    .result-line {
      transition: all 0.2s ease;
    }
    
    .result-line:hover {
      background-color: #f8fafc;
    }

    .lottery-input {
      font-family: 'Roboto Mono', monospace;
      line-height: 1.5;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
  <div class="max-w-6xl mx-auto p-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-semibold tracking-tight">Chuyển đổi Kết quả Xổ số</h1>
        <p class="text-zinc-400 mt-1">Từ định dạng lộn xộn → Định dạng chuẩn (ĐB, G.1, G.2...)</p>
      </div>
      <div class="flex items-center gap-x-2">
        <button onclick="loadExample()" 
                class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm font-medium flex items-center gap-x-2 transition-colors">
          <i class="fa-solid fa-file-import"></i>
          <span>Tải ví dụ</span>
        </button>
        <button onclick="clearAll()" 
                class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm font-medium flex items-center gap-x-2 transition-colors">
          <i class="fa-solid fa-trash"></i>
          <span>Xóa</span>
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      
      <!-- Input -->
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-x-2">
            <i class="fa-solid fa-file-lines text-emerald-400"></i>
            <span class="font-semibold">Dữ liệu gốc</span>
          </div>
          <span class="text-xs px-3 py-1 bg-zinc-800 rounded-full text-zinc-400">Dán kết quả vào đây</span>
        </div>
        
        <textarea id="inputText" rows="18" 
                  class="lottery-input w-full bg-zinc-950 border border-zinc-700 focus:border-emerald-500 rounded-2xl p-4 text-sm resize-y outline-none"
                  placeholder="Dán nội dung kết quả xổ số ở đây...&#10;Ví dụ:&#10;Giải Đb&#10;39256&#10;Giải Nhất&#10;76167&#10;..."></textarea>
      </div>

      <!-- Output -->
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-x-2">
            <i class="fa-solid fa-check-circle text-emerald-400"></i>
            <span class="font-semibold">Kết quả đã chuẩn hóa</span>
          </div>
          <button onclick="copyResult()" 
                  class="px-3 py-1.5 text-xs bg-emerald-600 hover:bg-emerald-500 transition-colors rounded-xl flex items-center gap-x-2">
            <i class="fa-solid fa-copy"></i>
            <span>Sao chép</span>
          </button>
        </div>

        <textarea id="outputText" rows="18" readonly
                  class="lottery-input w-full bg-zinc-950 border border-zinc-700 rounded-2xl p-4 text-sm resize-y outline-none font-medium"></textarea>
        
        <div id="stats" class="mt-3 text-xs text-zinc-400 flex items-center gap-x-4 hidden">
          <div>Đã chuyển đổi: <span id="prizeCount" class="font-semibold text-emerald-400">0</span> giải</div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="mt-6 flex justify-center">
      <button onclick="convertLottery()" 
              class="px-8 py-3.5 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 transition-all text-white font-semibold rounded-2xl flex items-center gap-x-3 text-base shadow-lg shadow-emerald-950">
        <i class="fa-solid fa-sync fa-fw"></i>
        <span>Chuyển đổi ngay</span>
      </button>
    </div>

    <div class="text-center mt-8 text-xs text-zinc-500">
      Hỗ trợ định dạng: Giải Đb, Giải Nhất, Giải Nhì, Giải Ba, Giải Tư, Giải Năm, Giải Sáu, Giải Bảy
    </div>
  </div>

  <script>
    function convertLottery() {
      const input = document.getElementById('inputText').value.trim();
      if (!input) {
        alert("Vui lòng dán dữ liệu vào ô bên trái!");
        return;
      }

      const lines = input.split('\n').map(line => line.trim()).filter(line => line.length > 0);

      const prizeMap = {
        "giải đb": "ĐB",
        "giải nhất": "G.1",
        "giải nhì": "G.2",
        "giải ba": "G.3",
        "giải tư": "G.4",
        "giải năm": "G.5",
        "giải sáu": "G.6",
        "giải bảy": "G.7"
      };

      let result = [];
      let currentPrize = null;
      let currentNumbers = [];

      for (let line of lines) {
        const lowerLine = line.toLowerCase();
        
        // Kiểm tra dòng là tên giải thưởng
        let foundPrize = null;
        for (let [key, value] of Object.entries(prizeMap)) {
          if (lowerLine.includes(key)) {
            foundPrize = value;
            break;
          }
        }

        if (foundPrize) {
          // Lưu giải trước đó (nếu có)
          if (currentPrize && currentNumbers.length > 0) {
            result.push(`${currentPrize} ${currentNumbers.join(' ')}`);
          }
          currentPrize = foundPrize;
          currentNumbers = [];
          continue;
        }

        // Nếu đang ở trong phần giải thưởng → lấy số
        if (currentPrize) {
          // Tìm các số có 2-5 chữ số (bỏ qua dòng thống kê)
          const numbers = line.match(/\b\d{2,5}\b/g);
          if (numbers && numbers.length > 0) {
            currentNumbers.push(...numbers);
          }
        }
      }

      // Lưu giải cuối cùng
      if (currentPrize && currentNumbers.length > 0) {
        result.push(`${currentPrize} ${currentNumbers.join(' ')}`);
      }

      // Hiển thị kết quả
      const outputArea = document.getElementById('outputText');
      outputArea.value = result.join('\n');

      // Hiển thị thống kê
      const stats = document.getElementById('stats');
      const count = document.getElementById('prizeCount');
      
      if (result.length > 0) {
        stats.classList.remove('hidden');
        count.textContent = result.length;
      } else {
        stats.classList.add('hidden');
      }
    }

    function copyResult() {
      const output = document.getElementById('outputText');
      if (!output.value) {
        alert("Chưa có kết quả để sao chép!");
        return;
      }
      
      navigator.clipboard.writeText(output.value).then(() => {
        const originalText = event.currentTarget?.innerHTML;
        const btns = document.querySelectorAll('button');
        
        // Hiệu ứng đã copy
        const toast = document.createElement('div');
        toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-5 py-2 rounded-2xl text-sm flex items-center gap-x-2 shadow-xl`;
        toast.innerHTML = `<i class="fa-solid fa-check"></i> <span>Đã sao chép vào clipboard!</span>`;
        document.body.appendChild(toast);
        
        setTimeout(() => {
          toast.style.transition = 'all 0.3s';
          toast.style.opacity = '0';
          setTimeout(() => toast.remove(), 300);
        }, 1800);
      }).catch(() => {
        // Fallback nếu không dùng clipboard API
        output.select();
        document.execCommand('copy');
        alert("Đã sao chép!");
      });
    }

    function loadExample() {
      const example = `Giải Đb
39256
Tài
Lẻ
Hổ
ĐầuĐuôi
Giải Nhất
76167
0 2
Giải Nhì
36520-40159
1 7,2
Giải Ba
94980-79002-86884
22866-15933-74370
2 0
3 3,0,7,4
Giải Tư
0664-5797-5294-8452
4 8
5 6,9,2,6,4,7
Giải Năm
3117-8830-3648-7912
5237-8556
6 7,6,4,7
7 0,9,0
Giải Sáu
554-179-034
8 0,4
Giải Bảy
70-57-67-91
9 7,4,1`;

      document.getElementById('inputText').value = example;
      // Tự động chuyển đổi luôn cho tiện
      setTimeout(() => {
        convertLottery();
      }, 300);
    }

    function clearAll() {
      document.getElementById('inputText').value = '';
      document.getElementById('outputText').value = '';
      document.getElementById('stats').classList.add('hidden');
    }

    // Cho phép nhấn Enter để chuyển đổi
    document.getElementById('inputText').addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        convertLottery();
      }
    });

    // Auto focus vào input khi load
    window.onload = function() {
      document.getElementById('inputText').focus();
    }
  </script>
</body>
</html>
